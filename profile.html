<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Lead Bridge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <h2 class="logo">LEAD BRIDGE</h2>
    <button id="navToggle" class="nav-toggle">☰</button>
    <nav id="mainNav" class="nav-collapsed">
      <a href="home.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="help.html">Help</a>
      <a href="index.html" onclick="logoutUser()">Logout</a>
    </nav>
  </header>

  <section class="profile-section">
    <h2>User Profile</h2>
    <div class="profile-box">
      <p><strong>Name:</strong> <span id="profileName"></span></p>
      <p><strong>Email:</strong> <span id="profileEmail"></span></p>
      <button onclick="enableEdit()">Edit Profile</button>
    </div>

    <div class="edit-box" id="editBox">
      <input type="text" id="editName" placeholder="Enter new name" />
      <input type="email" id="editEmail" placeholder="Enter new email" />
      <button onclick="saveProfile()">Save Changes</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
